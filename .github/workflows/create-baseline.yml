name: "detekt-validation"
on:
  workflow_call:
    secrets:
      ACTIONS_TOKEN:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      STORE_PASSWORD:
        required: true
      KEYSTORE_BASE64:
        required: true
jobs:
  publish:
    name: Upload baseline profile file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v2

      - uses: christian-draeger/read-properties@1.1.1
        id: properties
        with:
          path: './gradle.properties'
          properties: 'makeevrserg.project.name makeevrserg.project.version.string'

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Give gradle permission
        run: chmod +x gradlew

      - name: Run baseline profiles
        uses: gradle/gradle-build-action@v2
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        with:
          arguments: :instances:androidApp:generateReleaseBaselineProfile --stacktrace

      - uses: actions/upload-artifact@master
        name: "Upload baseline file"
        with:
          name: baseline_profile_file
          path: ./instances/androidApp/src/release/generated/baselineProfiles/baseline-prof.txt
